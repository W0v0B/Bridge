<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bridge</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.25s ease;
      }
      #splash img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        animation: splash-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes splash-pop {
        from { opacity: 0; transform: scale(0.7); }
        to   { opacity: 1; transform: scale(1); }
      }
    </style>
    <!-- Set splash bg from persisted theme before first paint to avoid color flash -->
    <script>
      (function () {
        var bgMap = {
          snow:   "#ffffff",
          dark:   "#1e1e1e",
          rose:   "#191324",
          arctic: "#13202e",
          violet: "#11101c",
          nord:   "#2e3440",
        };
        var bg = "#1e1e1e";
        try {
          var raw = localStorage.getItem("bridge-config");
          if (raw) {
            var theme = JSON.parse(raw).state && JSON.parse(raw).state.config && JSON.parse(raw).state.config.theme;
            if (theme && bgMap[theme]) bg = bgMap[theme];
          }
        } catch (_) {}
        document.write(
          '<div id="splash" style="background:' + bg + '">' +
            '<img src="/icon.png" alt="" draggable="false" />' +
          '</div>'
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
